<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🧲 Hook Lab</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f0e8;
      --surface: #ffffff;
      --border: #e0d8cc;
      --ink: #1a1208;
      --muted: #9a9080;
      --accent: #ff3d00;
      --accent2: #ffb300;
      --accent3: #00b894;
      --tag-bg: #1a1208;
      --tag-text: #f5f0e8;
      --shadow: 4px 4px 0px #1a1208;
      --shadow-sm: 2px 2px 0px #1a1208;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
      position: relative;
    }

    /* Dot grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, #c8bfb0 1px, transparent 1px);
      background-size: 24px 24px;
      opacity: 0.5;
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      max-width: 680px;
      margin: 0 auto;
    }

    /* ── HEADER ── */
    .header {
      margin-bottom: 2.5rem;
      animation: fadeDown 0.5s ease both;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.5rem;
    }

    .logo-badge {
      background: var(--accent);
      color: white;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem;
      letter-spacing: 0.1em;
      padding: 0.25rem 0.75rem;
      border: 2px solid var(--ink);
      box-shadow: var(--shadow-sm);
    }

    .logo-version {
      font-size: 0.7rem;
      font-family: 'DM Sans', monospace;
      color: var(--muted);
      border: 1.5px solid var(--border);
      padding: 0.2rem 0.5rem;
      border-radius: 99px;
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 8vw, 5rem);
      line-height: 0.95;
      letter-spacing: 0.02em;
      color: var(--ink);
    }

    h1 span { color: var(--accent); }

    .header-sub {
      font-size: 0.95rem;
      color: var(--muted);
      margin-top: 0.6rem;
      max-width: 420px;
      line-height: 1.5;
    }

    /* ── INPUT CARD ── */
    .input-card {
      background: var(--surface);
      border: 2px solid var(--ink);
      box-shadow: var(--shadow);
      padding: 1.5rem;
      margin-bottom: 2rem;
      animation: fadeUp 0.5s ease 0.1s both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .input-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.6rem;
      display: block;
    }

    .topic-input {
      width: 100%;
      background: var(--bg);
      border: 2px solid var(--border);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      font-size: 1.05rem;
      font-weight: 500;
      padding: 0.85rem 1rem;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      margin-bottom: 1rem;
    }

    .topic-input::placeholder { color: var(--muted); font-weight: 400; }

    .topic-input:focus {
      border-color: var(--ink);
      box-shadow: var(--shadow-sm);
    }

    /* Platform pills */
    .platform-row {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 1.25rem;
    }

    .platform-pill {
      background: var(--bg);
      border: 2px solid var(--border);
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      padding: 0.35rem 0.85rem;
      cursor: pointer;
      transition: all 0.12s;
      border-radius: 2px;
    }

    .platform-pill:hover {
      border-color: var(--ink);
      color: var(--ink);
    }

    .platform-pill.active {
      background: var(--ink);
      border-color: var(--ink);
      color: var(--bg);
    }

    .generate-btn {
      width: 100%;
      background: var(--accent);
      border: 2px solid var(--ink);
      box-shadow: var(--shadow);
      color: white;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
      letter-spacing: 0.1em;
      padding: 0.75rem;
      cursor: pointer;
      transition: all 0.12s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .generate-btn:hover {
      transform: translate(-2px, -2px);
      box-shadow: 6px 6px 0px var(--ink);
    }

    .generate-btn:active {
      transform: translate(2px, 2px);
      box-shadow: 1px 1px 0px var(--ink);
    }

    .generate-btn:disabled {
      background: var(--muted);
      cursor: not-allowed;
      transform: none;
      box-shadow: var(--shadow);
    }

    /* ── HOOKS GRID ── */
    .hooks-section {
      display: none;
      flex-direction: column;
      gap: 1rem;
      animation: fadeUp 0.4s ease both;
    }

    .hooks-section.visible { display: flex; }

    .section-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .hook-card {
      background: var(--surface);
      border: 2px solid var(--ink);
      box-shadow: var(--shadow);
      padding: 1.2rem 1.2rem 1rem;
      transition: transform 0.12s, box-shadow 0.12s;
      animation: fadeUp 0.4s ease both;
    }

    .hook-card:nth-child(2) { animation-delay: 0.05s; }
    .hook-card:nth-child(3) { animation-delay: 0.1s; }
    .hook-card:nth-child(4) { animation-delay: 0.15s; }
    .hook-card:nth-child(5) { animation-delay: 0.2s; }
    .hook-card:nth-child(6) { animation-delay: 0.25s; }

    .hook-card:hover {
      transform: translate(-2px, -2px);
      box-shadow: 6px 6px 0px var(--ink);
    }

    .hook-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.75rem;
    }

    .hook-type {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: var(--tag-bg);
      color: var(--tag-text);
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.25rem 0.6rem;
    }

    .hook-type.shock   { background: #e74c3c; }
    .hook-type.question { background: #2980b9; }
    .hook-type.story   { background: #8e44ad; }
    .hook-type.bold    { background: #e67e22; }
    .hook-type.curiosity { background: #27ae60; }

    .copy-btn {
      background: transparent;
      border: 1.5px solid var(--border);
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 0.25rem 0.65rem;
      cursor: pointer;
      transition: all 0.12s;
      border-radius: 2px;
    }

    .copy-btn:hover {
      background: var(--ink);
      border-color: var(--ink);
      color: var(--bg);
    }

    .copy-btn.copied {
      background: var(--accent3);
      border-color: var(--accent3);
      color: white;
    }

    .hook-text {
      font-size: 1rem;
      font-weight: 500;
      line-height: 1.55;
      color: var(--ink);
    }

    /* loading shimmer */
    .shimmer {
      background: linear-gradient(90deg, var(--border) 25%, var(--bg) 50%, var(--border) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
      height: 1em;
      border-radius: 2px;
      margin-bottom: 0.5rem;
    }

    @keyframes shimmer {
      from { background-position: 200% 0; }
      to   { background-position: -200% 0; }
    }

    /* shake */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }
    .shake { animation: shake 0.3s ease; }

    /* footer */
    .footer {
      text-align: center;
      margin-top: 3rem;
      font-size: 0.72rem;
      color: var(--muted);
      font-weight: 500;
    }
  </style>
</head>
<body>
<div class="wrapper">

  <!-- HEADER -->
  <div class="header">
    <div class="logo-row">
      <div class="logo-badge">🧲 Hook Lab</div>
      <div class="logo-version">v0.1 — Day 1</div>
    </div>
    <h1>STOP THE<br><span>SCROLL.</span></h1>
    <p class="header-sub">Enter your content topic and get 5 scroll-stopping hooks — instantly. Built for creators who want to grow.</p>
  </div>

  <!-- INPUT CARD -->
  <div class="input-card">
    <label class="input-label" for="topic-input">Your content topic</label>
    <input
      type="text"
      id="topic-input"
      class="topic-input"
      placeholder="e.g. how to wake up at 5am, budget travel India, gym for beginners…"
      maxlength="150"
    />

    <label class="input-label">Platform</label>
    <div class="platform-row">
      <button class="platform-pill active" data-platform="YouTube">▶ YouTube</button>
      <button class="platform-pill" data-platform="Instagram">◈ Instagram</button>
      <button class="platform-pill" data-platform="Twitter">✦ Twitter / X</button>
      <button class="platform-pill" data-platform="LinkedIn">◉ LinkedIn</button>
    </div>

    <button class="generate-btn" id="generate-btn">
      🧲 GENERATE HOOKS
    </button>
  </div>

  <!-- HOOKS OUTPUT -->
  <div class="hooks-section" id="hooks-section">
    <div class="section-label">5 hooks generated</div>
    <div id="hooks-container"></div>
  </div>

  <div class="footer">Hook Lab — built in 30 min/day 🔥</div>

</div>

<script>
  let selectedPlatform = 'YouTube';

  // Platform selector
  document.querySelectorAll('.platform-pill').forEach(pill => {
    pill.addEventListener('click', () => {
      document.querySelectorAll('.platform-pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      selectedPlatform = pill.dataset.platform;
    });
  });

  // Hook templates (Day 1 — static. Day 2 we replace with real AI!)
  const hookTemplates = {
    shock: {
      label: '🤯 Shock',
      cls: 'shock',
      fn: (t) => `99% of people who try "${t}" quit in the first week. Here's the brutal truth no one tells you.`
    },
    question: {
      label: '❓ Question',
      cls: 'question',
      fn: (t) => `What if everything you knew about "${t}" was completely wrong? Most people never find out.`
    },
    story: {
      label: '📖 Story',
      cls: 'story',
      fn: (t) => `6 months ago I knew nothing about "${t}". Today it changed my life — here's exactly what happened.`
    },
    bold: {
      label: '🎯 Bold Claim',
      cls: 'bold',
      fn: (t) => `"${t}" is the single most underrated skill you can learn in 2025. And almost nobody is talking about it.`
    },
    curiosity: {
      label: '👀 Curiosity Gap',
      cls: 'curiosity',
      fn: (t) => `The real reason most people fail at "${t}" has nothing to do with what you think. Watch till the end.`
    }
  };

  const generateBtn = document.getElementById('generate-btn');
  const topicInput  = document.getElementById('topic-input');
  const hooksSection = document.getElementById('hooks-section');
  const hooksContainer = document.getElementById('hooks-container');

  generateBtn.addEventListener('click', generateHooks);
  topicInput.addEventListener('keydown', e => { if (e.key === 'Enter') generateHooks(); });

  function generateHooks() {
    const topic = topicInput.value.trim();
    if (!topic) {
      topicInput.classList.add('shake');
      topicInput.focus();
      setTimeout(() => topicInput.classList.remove('shake'), 400);
      return;
    }

    // Show loading
    generateBtn.disabled = true;
    generateBtn.textContent = '⏳ Generating...';
    hooksSection.classList.add('visible');
    hooksContainer.innerHTML = `
      <div style="display:flex;flex-direction:column;gap:1rem;">
        ${[1,2,3,4,5].map(() => `
          <div style="background:white;border:2px solid #1a1208;padding:1.2rem;box-shadow:4px 4px 0 #1a1208;">
            <div class="shimmer" style="width:30%;margin-bottom:0.75rem;"></div>
            <div class="shimmer" style="width:100%;"></div>
            <div class="shimmer" style="width:80%;"></div>
          </div>`).join('')}
      </div>`;

    // Simulate generation delay (Day 2: real AI replaces this)
    setTimeout(() => {
      renderHooks(topic);
      generateBtn.disabled = false;
      generateBtn.innerHTML = '🧲 GENERATE HOOKS';
    }, 1000);
  }

  function renderHooks(topic) {
    const types = Object.values(hookTemplates);
    hooksContainer.innerHTML = '';

    // Wrap in a fragment for staggered animation
    const frag = document.createDocumentFragment();
    types.forEach((hook, i) => {
      const card = document.createElement('div');
      card.className = 'hook-card';
      card.style.animationDelay = `${i * 0.07}s`;
      card.innerHTML = `
        <div class="hook-top">
          <span class="hook-type ${hook.cls}">${hook.label}</span>
          <button class="copy-btn" data-index="${i}">Copy</button>
        </div>
        <div class="hook-text">${hook.fn(topic)}</div>
      `;
      frag.appendChild(card);
    });

    hooksContainer.appendChild(frag);

    // Copy buttons
    hooksContainer.querySelectorAll('.copy-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const text = btn.closest('.hook-card').querySelector('.hook-text').textContent;
        navigator.clipboard.writeText(text).then(() => {
          btn.textContent = '✓ Copied!';
          btn.classList.add('copied');
          setTimeout(() => {
            btn.textContent = 'Copy';
            btn.classList.remove('copied');
          }, 2000);
        });
      });
    });
  }
</script>
</body>
</html>
